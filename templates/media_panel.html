{% extends "layout.html" %}
{% block content %}
<div class="mb-2 d-flex justify-content-between align-items-center flex-wrap gap-2">
  <a class="btn btn-outline-secondary btn-sm btn-volver" href="{{ url_for('media_gallery_view') }}" title="Volver a Fotos / Vídeos" aria-label="Volver a Fotos / Vídeos"><i class="fa fa-arrow-left"></i></a>
</div>
<div class="ficha-hero mb-3">
  <span class="ficha-hero__media d-flex align-items-center justify-content-center" style="background:#f8f9fa;color:#adb5bd;font-size:2rem;"><i class="fa fa-images"></i></span>
  <div class="ficha-hero__body">
    <div class="ficha-hero__eyebrow">Fotos / Vídeos{% if owner_type == 'ARTIST' %} · Suelto (del artista){% endif %}</div>
    <h1 class="ficha-hero__title">{{ panel_title }}</h1>
  </div>
</div>
{% include '_fotos_panel.html' %}
{% endblock %}
