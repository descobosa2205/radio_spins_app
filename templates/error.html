<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ code or 'Error' }} · 33 | Backoffice</title>
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet" />
  <style>:root{ --brand-primary: {{ BRAND_PRIMARY or '#E33D48' }}; --brand-accent: {{ BRAND_ACCENT or '#007CA2' }}; }</style>
</head>
<body>
  <div class="d-flex flex-column align-items-center justify-content-center text-center" style="min-height:100vh;padding:2rem;">
    <img src="{{ url_for('static', filename='img/Banner.png') }}" alt="33 Producciones · Pies Records" style="height:40px;" class="mb-4">
    <div class="display-1 fw-bold" style="color:var(--brand-primary);line-height:1;">{{ code or '' }}</div>
    <h1 class="h4 mt-2 mb-2">{{ title or 'Ha ocurrido un error' }}</h1>
    <p class="text-muted mb-4" style="max-width:520px;">{{ message or 'No se ha podido completar la operación.' }}</p>
    <div class="d-flex gap-2 flex-wrap justify-content-center">
      <a href="{{ back_url or '#' }}" class="btn btn-primary" onclick="if(window.history.length>1){history.back();return false;}"><i class="fa fa-arrow-left me-1"></i>Volver</a>
      <a href="{{ url_for('home') }}" class="btn btn-outline-secondary"><i class="fa fa-house me-1"></i>Ir al inicio</a>
    </div>
  </div>
</body>
</html>
