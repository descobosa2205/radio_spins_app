<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hoja de ruta · {{ title }}</title>
  <meta property="og:type" content="website">
  <meta property="og:title" content="Hoja de ruta · {{ title }}">
  {% if artist_photo %}<meta property="og:image" content="{{ artist_photo }}"><meta name="twitter:image" content="{{ artist_photo }}">{% endif %}
  <meta name="twitter:card" content="summary_large_image">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="public-invitation-page">
  <main class="container py-4 py-md-5">
    <div class="public-invitation-shell">
      <div class="d-flex justify-content-between align-items-start gap-3 mb-3 flex-wrap">
        <div class="d-flex align-items-center gap-2">
          {% if artist_photo %}<img src="{{ artist_photo }}" alt="" style="width:52px;height:52px;border-radius:50%;object-fit:cover;flex:0 0 auto;">{% endif %}
          <div>
            <h1 class="h3 mb-0">{{ title }}</h1>
            {% if artist_label and artist_label != title %}<div class="text-muted">{{ artist_label }}</div>{% endif %}
          </div>
        </div>
        <span class="badge text-bg-light border py-2"><i class="fa fa-eye me-1 text-danger"></i>Solo lectura</span>
      </div>
      <h2 class="text-center h5 mb-3 text-muted">Hoja de ruta</h2>
      {% set roadmap_ctx = rm %}
      {% include '_roadmap_panel.html' %}
    </div>
  </main>
</body>
</html>
