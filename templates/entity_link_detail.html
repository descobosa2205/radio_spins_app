{% extends "layout.html" %}
{% block content %}
<div class="card border-0 shadow-sm mb-4">
  <div class="card-body d-flex align-items-center gap-3 flex-wrap">
    <img src="{{ item_photo_url or DEFAULT_PHOTO_URL }}" alt="{{ item_title }}" data-default-photo="1" style="width:92px;height:92px;border-radius:22px;object-fit:contain;background:#f8f9fa;border:1px solid #e5e7eb;">
    <div class="flex-grow-1 min-w-0">
      <div class="small text-uppercase text-muted">{{ item_type_label }}</div>
      <h3 class="mb-1 text-truncate">{{ item_title }}</h3>
      <div class="text-muted text-truncate">{{ item_subtitle }}</div>
    </div>
    <a class="btn btn-outline-secondary" href="{{ back_url }}">Volver</a>
  </div>
</div>

<ul class="nav nav-tabs mb-0">
  <li class="nav-item"><span class="nav-link active">Vinculaciones</span></li>
</ul>
<div class="bg-white border border-top-0 rounded-bottom p-3">
  {% include '_entity_links_panel.html' %}
</div>
{% endblock %}
