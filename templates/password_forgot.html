{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h4 class="mb-2">He olvidado mi contraseña</h4>
        <p class="text-muted">Introduce tu email y te enviaremos un enlace para crear una nueva contraseña.</p>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required placeholder="tu@email.com">
          </div>
          <div class="d-grid gap-2">
            <button class="btn btn-primary">Enviar correo de recuperación</button>
            <a href="{{ url_for('admin_login') }}" class="btn btn-outline-secondary">Volver al login</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
