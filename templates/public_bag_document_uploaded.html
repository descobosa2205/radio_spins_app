<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Documento recibido</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-5" style="max-width:760px;">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4 p-md-5 text-center">
        <img src="{{ url_for('static', filename='img/Banner.png') }}" alt="Logo" style="height:42px;object-fit:contain;" class="mb-4">
        <h3>Documento recibido</h3>
        <p class="text-muted mb-4">La factura o ticket se ha vinculado correctamente al gasto.</p>
        {% if expense.attachment_url %}<a href="{{ expense.attachment_url }}" class="btn btn-outline-dark" target="_blank">Ver documento subido</a>{% endif %}
      </div>
    </div>
  </main>
</body>
</html>
