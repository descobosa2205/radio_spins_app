{% set h = hotel if hotel is defined else {} %}
<div class="modal-header"><h5 class="modal-title">Alojamiento</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
<div class="modal-body">
  <div class="row g-3">
    <div class="col-md-6"><label class="form-label">Hotel</label><input class="form-control" name="hotel_name" value="{{ h.name or '' }}" placeholder="Nombre del hotel"></div>
    <div class="col-md-6"><label class="form-label">Dirección</label><input class="form-control" name="hotel_address" value="{{ h.address or '' }}" placeholder="Dirección completa"></div>
    <div class="col-12"><label class="form-label">Días afectados</label><div class="d-flex gap-2 flex-wrap">{% for d in rm.days %}<label class="btn btn-sm btn-outline-secondary {% if h.days and d.date in h.days %}active{% endif %}"><input class="btn-check" type="checkbox" name="days[]" value="{{ d.date }}" {% if (h.days and d.date in h.days) or ((not h.days) and d.date == selected_day) %}checked{% endif %}>{{ d.short }}</label>{% endfor %}</div></div>
    <div class="col-md-4"><label class="form-label d-block">Asignación</label><div class="form-check form-switch"><input class="form-check-input" type="checkbox" name="for_all" value="1" id="forAll{{ h.id or 'New' }}" {% if h.for_all or not h %}checked{% endif %}><label class="form-check-label" for="forAll{{ h.id or 'New' }}">Para todos</label></div></div>
    <div class="col-md-8"><label class="form-label">Personas afectadas</label><input class="form-control" name="people_text" value="{{ h.people_text or '' }}" placeholder="Nombres si no es para todos"></div>
    <div class="col-md-4"><div class="form-check mt-4"><input class="form-check-input" type="checkbox" name="breakfast" value="1" {% if h.breakfast %}checked{% endif %}><label class="form-check-label">Incluye desayuno</label></div></div>
    <div class="col-md-4"><div class="form-check mt-4"><input class="form-check-input" type="checkbox" name="free_cancel" value="1" {% if h.free_cancel %}checked{% endif %}><label class="form-check-label">Cancelación gratuita</label></div></div>
    <div class="col-md-4"><label class="form-label">Hasta cuándo</label><input class="form-control" type="datetime-local" name="cancel_until" value="{{ h.cancel_until or '' }}"></div>
    <div class="col-12"><label class="form-label">Nota</label><textarea class="form-control" name="note" rows="2">{{ h.note or '' }}</textarea></div>
  </div>
</div>
<div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-primary">Guardar alojamiento</button></div>
