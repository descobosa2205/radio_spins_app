<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Subir factura/ticket</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-5" style="max-width:760px;">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <img src="{{ url_for('static', filename='img/Banner.png') }}" alt="Logo" style="height:42px;object-fit:contain;">
        </div>
        <h3 class="mb-2">Subir factura o ticket</h3>
        <p class="text-muted">Este enlace está vinculado únicamente al gasto solicitado.</p>
        <div class="border rounded-3 p-3 bg-light-subtle mb-4">
          <div><strong>Bolsa:</strong> {{ bag.title if bag else '—' }}</div>
          <div><strong>Concepto:</strong> {{ expense.concept or 'Gasto' }}</div>
          <div><strong>Importe:</strong> {{ expense.amount_gross|eur }}</div>
        </div>
        <form method="post" enctype="multipart/form-data">
          <label class="form-label">Factura o ticket</label>
          <input type="file" name="document" class="form-control" accept=".pdf,image/*" required>
          <div class="form-text">Formatos permitidos: PDF o imagen.</div>
          <div class="d-flex justify-content-end mt-4"><button class="btn btn-dark">Subir documento</button></div>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
