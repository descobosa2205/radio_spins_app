<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Materiales compartidos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <style>
    body{ background:#f5f5f5; }
    .ps-wrap{ max-width:820px; margin:0 auto; padding:1.25rem; }
    .ps-logo{ max-height:56px; }
    .ps-item{ display:flex; align-items:center; gap:.75rem; background:#fff; border:1px solid #e5e5e5; border-radius:.6rem; padding:.6rem; margin-bottom:.5rem; }
    .ps-thumb{ width:64px; height:64px; border-radius:.4rem; object-fit:cover; flex:0 0 auto; background:#eee; }
  </style>
</head>
<body>
<div class="ps-wrap">
  <div class="text-end mb-2"><img class="ps-logo" src="{{ logo }}" alt=""></div>
  <h2 class="text-center mb-1">Envío de materiales</h2>
  {% if owner_title %}<p class="text-center text-muted">{{ owner_title }} · {{ count_label }}</p>{% endif %}

  {% for p in photos %}
  <div class="ps-item">
    {% if p.is_video %}<video class="ps-thumb" src="{{ p.file_url }}" muted></video>{% else %}<img class="ps-thumb" src="{{ p.file_url }}" alt="">{% endif %}
    <div class="flex-grow-1 text-truncate">{{ p.title }}</div>
    <a class="btn btn-sm btn-outline-secondary" href="{{ p.download_url }}"><i class="fa fa-download me-1"></i>Descargar</a>
  </div>
  {% endfor %}

  <div class="text-center my-4">
    <a class="btn btn-primary btn-lg" href="{{ zip_url }}"><i class="fa fa-file-zipper me-1"></i>Descargar todas (ZIP)</a>
  </div>
</div>
</body>
</html>
