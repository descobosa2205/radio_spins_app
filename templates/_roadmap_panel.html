{# Hoja de ruta v2 — panel embebido (Agenda / Logística / Hoteles / Personal).
   Datos en #roadmapData; render e interacción en static/js/roadmap.js.
   Requiere `roadmap_ctx` en el contexto (concert/action/promotion detail). #}
{% set rm = roadmap_ctx %}
{% if rm and rm.entity_id %}
<div class="rm-panel" id="roadmapPanel"
     {% if rm.readonly %}data-readonly="1" data-base=""{% else %}data-base="{{ url_for('roadmap_item_save', entity_type=rm.entity_type, entity_id=rm.entity_id) }}"{% endif %}>
  <script type="application/json" id="roadmapData">{{ rm | tojson }}</script>
  <div class="rm-nav" role="tablist">
    <button type="button" class="active" data-rm-tab="agenda"><i class="fa fa-calendar-day"></i> Agenda</button>
    <button type="button" data-rm-tab="logistica"><i class="fa fa-route"></i> Logística</button>
    <button type="button" data-rm-tab="hoteles"><i class="fa fa-hotel"></i> Hoteles</button>
    <button type="button" data-rm-tab="personal"><i class="fa fa-users"></i> Personal</button>
  </div>
  <div id="rmView" class="rm-view"></div>
</div>
<script src="{{ url_for('static', filename='js/roadmap.js', v=ASSET_V) }}"></script>
{% endif %}
