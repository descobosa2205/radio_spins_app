{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4 p-lg-5">
        <div class="text-center mb-4">
          <div class="d-flex justify-content-center align-items-center gap-3 flex-wrap mb-3">
            <img src="{{ url_for('static', filename='img/logo_33_producciones.png') }}" style="height:50px;" alt="33 Producciones">
            <img src="{{ url_for('static', filename='img/logo.png') }}" style="height:60px;" alt="PIES">
          </div>
          <h4 class="mt-2 mb-1">Iniciar sesión</h4>
          <div class="small text-muted">Accede con tu email y tu contraseña del Back Office.</div>
        </div>
        <form method="post" action="{{ url_for('admin_login') }}">
          <input type="hidden" name="next" value="{{ next_url or '' }}">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input name="email" type="email" class="form-control form-control-lg" required placeholder="tu@email.com">
          </div>
          <div class="mb-2">
            <label class="form-label">Contraseña</label>
            <input name="password" type="password" class="form-control form-control-lg" required placeholder="Tu contraseña">
          </div>
          <div class="text-end mb-3">
            <a href="{{ url_for('password_forgot') }}" class="small text-decoration-none">He olvidado mi contraseña</a>
          </div>
          <div class="d-grid">
            <button class="btn btn-primary btn-lg">Entrar</button>
          </div>
        </form>
      </div>
    </div>
    <div class="text-center mt-3">
      <a href="{{ url_for('landing') }}" class="text-decoration-none">
        <i class="fa fa-arrow-left me-1"></i> Volver
      </a>
    </div>
  </div>
</div>
{% endblock %}
