<meta name="theme-color" content="#E33D48">
<style>
  :root{
    --red:#E33D48; --red-d:#c5313b; --teal:#007CA2; --teal-d:#016585;
    --gold:#f7b733; --ink:#1a1f27; --muted:#5b6472; --bg:#f5f7fb; --card:#ffffff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink);
    background:var(--bg);min-height:100%;display:flex;align-items:center;justify-content:center;
    padding:24px;position:relative;overflow:hidden;-webkit-font-smoothing:antialiased;
  }
  /* Resplandores de fondo con los colores corporativos + un toque veraniego (dorado). */
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:
      radial-gradient(48% 58% at 10% 6%, rgba(0,124,162,.20), transparent 60%),
      radial-gradient(52% 62% at 92% 16%, rgba(227,61,72,.20), transparent 55%),
      radial-gradient(60% 60% at 82% 104%, rgba(247,183,51,.16), transparent 60%);
  }
  /* Confeti (fiesta) cayendo, en colores corporativos + dorado. */
  .confetti{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  .confetti i{position:absolute;top:-6vh;width:9px;height:13px;border-radius:2px;opacity:0;
    animation:fall linear infinite}
  @keyframes fall{
    0%{transform:translateY(-8vh) rotate(0);opacity:0}
    12%{opacity:.95}
    88%{opacity:.95}
    100%{transform:translateY(112vh) rotate(760deg);opacity:0}
  }

  .card{
    position:relative;z-index:2;width:100%;max-width:660px;background:var(--card);
    border:1px solid #eceef3;border-radius:28px;box-shadow:0 34px 90px rgba(20,30,60,.16);
    padding:40px 42px 34px;text-align:center;overflow:hidden;
    animation:pop .5s cubic-bezier(.2,.9,.3,1.2) both;
  }
  @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
  .card::after{content:"";position:absolute;top:0;left:0;right:0;height:6px;
    background:linear-gradient(90deg,var(--red),var(--gold),var(--teal))}

  .banner{max-width:100%;height:auto;max-height:34px;margin:6px auto 24px;object-fit:contain;display:block}

  /* Cluster de iconos temáticos (música · fiesta · verano · conciertos) en cápsulas
     con el tinte de los colores corporativos, flotando. */
  .icons{display:flex;flex-wrap:wrap;gap:11px;justify-content:center;margin:2px 0 18px}
  .icons span{
    font-size:29px;line-height:1;width:58px;height:58px;display:flex;align-items:center;
    justify-content:center;border-radius:17px;border:1px solid transparent;
    animation:bob 3.2s ease-in-out infinite;will-change:transform;
  }
  .icons span:nth-child(odd){background:rgba(227,61,72,.10);border-color:rgba(227,61,72,.22)}
  .icons span:nth-child(even){background:rgba(0,124,162,.10);border-color:rgba(0,124,162,.22)}
  .icons span:nth-child(3n){background:rgba(247,183,51,.14);border-color:rgba(247,183,51,.30)}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-11px) rotate(5deg)}}
  .icons span:nth-child(1){animation-delay:0s}
  .icons span:nth-child(2){animation-delay:.15s}
  .icons span:nth-child(3){animation-delay:.30s}
  .icons span:nth-child(4){animation-delay:.45s}
  .icons span:nth-child(5){animation-delay:.60s}
  .icons span:nth-child(6){animation-delay:.75s}
  .icons span:nth-child(7){animation-delay:.90s}
  .icons span:nth-child(8){animation-delay:1.05s}
  .icons span:nth-child(9){animation-delay:1.20s}
  .icons span:nth-child(10){animation-delay:1.35s}
  .icons span:nth-child(11){animation-delay:1.50s}
  .icons span:nth-child(12){animation-delay:1.65s}

  /* Ecualizador (música) con los colores corporativos animándose. */
  .eq{display:flex;gap:5px;justify-content:center;align-items:flex-end;height:34px;margin:4px 0 20px}
  .eq i{width:7px;height:8px;border-radius:5px;background:linear-gradient(var(--teal),var(--red));
    animation:eq 1s ease-in-out infinite;will-change:height}
  @keyframes eq{0%,100%{height:8px}50%{height:32px}}
  .eq i:nth-child(1){animation-delay:0s}
  .eq i:nth-child(2){animation-delay:.18s}
  .eq i:nth-child(3){animation-delay:.36s}
  .eq i:nth-child(4){animation-delay:.10s}
  .eq i:nth-child(5){animation-delay:.28s}
  .eq i:nth-child(6){animation-delay:.46s}
  .eq i:nth-child(7){animation-delay:.06s}
  .eq i:nth-child(8){animation-delay:.24s}
  .eq i:nth-child(9){animation-delay:.42s}

  h1{font-size:clamp(30px,6.5vw,46px);font-weight:900;letter-spacing:-.6px;margin:2px 0 12px;
    background:linear-gradient(90deg,var(--red),var(--teal));-webkit-background-clip:text;
    background-clip:text;color:transparent}
  .lead{font-size:clamp(16px,2.7vw,19px);color:var(--ink);font-weight:600;max-width:520px;margin:0 auto 8px;line-height:1.5}
  .sub{font-size:15px;color:var(--muted);margin:0 auto 24px}
  .btn{display:inline-flex;align-items:center;gap:9px;font:inherit;font-weight:800;font-size:15px;
    color:#fff;background:var(--red);border:none;border-radius:14px;padding:13px 26px;cursor:pointer;
    box-shadow:0 12px 26px rgba(227,61,72,.30);transition:.15s}
  .btn:hover{background:var(--red-d);transform:translateY(-2px);box-shadow:0 16px 34px rgba(227,61,72,.38)}
  .btn:active{transform:translateY(0)}
  .btn svg{width:17px;height:17px;fill:currentColor}
  .cd{margin-top:16px;font-size:13px;color:var(--muted)}
  .cd b{color:var(--teal-d);font-variant-numeric:tabular-nums}

  @media (max-width:520px){
    .card{padding:32px 22px 28px;border-radius:22px}
    .icons span{width:50px;height:50px;font-size:25px}
    .banner{max-height:26px}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
    .confetti{display:none}
  }
</style>
</head>

    <h1>Paciencia 🎶</h1>
    <p class="lead">Estamos trabajando en cosas muy chulas que pronto podrás disfrutar.</p>

    <p class="cd" id="cdWrap">Reintentaremos solos en <b id="cd">30</b> s</p>

<script>
  (function(){
    // Confeti en los colores corporativos + dorado (fiesta).
    var host = document.getElementById('confetti');
    if (host && !window.matchMedia('(prefers-reduced-motion: reduce)').matches){
      var cols = ['#E33D48','#007CA2','#f7b733','#E33D48','#007CA2'];
      var N = 26;
      for (var i=0;i<N;i++){
        var c = document.createElement('i');
        c.style.left = (Math.random()*100) + 'vw';
        c.style.background = cols[i % cols.length];
        c.style.animationDuration = (5 + Math.random()*5).toFixed(2) + 's';
        c.style.animationDelay = (-Math.random()*8).toFixed(2) + 's';
        if (i % 3 === 0) c.style.borderRadius = '50%';
        host.appendChild(c);
      }
    }
    // Cuenta atrás y reintento automático (recarga la MISMA URL: cuando el servidor vuelva,
    // aparecerá la app real). Con tope de reintentos para NO machacar un servidor caído: tras
    // ~5 min dejamos de reintentar solos (el botón sigue disponible).
    var MAX = 10, wrap = document.getElementById('cdWrap'), el = document.getElementById('cd');
    var done = 0;
    try { done = parseInt(sessionStorage.getItem('maint_retries') || '0', 10) || 0; } catch(e){}
    if (done >= MAX){
      if (wrap) wrap.textContent = 'Si sigue sin cargar, vuelve a intentarlo dentro de un rato.';
    } else {
      var n = 30;
      setInterval(function(){
        n -= 1;
        if (n <= 0){
          try { sessionStorage.setItem('maint_retries', String(done + 1)); } catch(e){}
          location.reload();
          return;
        }
        if (el) el.textContent = n;
      }, 1000);
    }
  })();
</script>
