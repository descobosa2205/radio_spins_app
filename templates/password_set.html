{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h4 class="mb-2">Crear o cambiar contraseña</h4>
        <p class="text-muted">Usuario: <strong>{{ email }}</strong></p>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Nueva contraseña</label>
            <input type="password" name="password" class="form-control" required minlength="8">
          </div>
          <div class="mb-3">
            <label class="form-label">Repite la contraseña</label>
            <input type="password" name="password_confirm" class="form-control" required minlength="8">
          </div>
          <div class="d-grid gap-2">
            <button class="btn btn-primary">Guardar contraseña</button>
            <a href="{{ url_for('admin_login') }}" class="btn btn-outline-secondary">Ir al login</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
