<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Label Copy · {{ album.title }}</title>
  <style>
    body{margin:0;background:#f5f7fb;color:#111827;font-family:Arial,Helvetica,sans-serif;}.page{max-width:980px;margin:32px auto;padding:0 16px}.actions{display:flex;justify-content:flex-end;margin-bottom:14px}.btn{display:inline-block;padding:11px 15px;border-radius:12px;text-decoration:none;font-weight:700;background:#111827;color:#fff}.sheet{background:#fff;border:1px solid #e5e7eb;border-radius:22px;box-shadow:0 18px 42px rgba(15,23,42,.08);padding:30px}.brand-row{display:flex;justify-content:flex-end;margin-bottom:10px}.brand{max-height:54px;max-width:180px;object-fit:contain}h1{font-size:28px;margin:0 0 18px}.hero{display:grid;grid-template-columns:160px 1fr;gap:22px;align-items:start;margin-bottom:22px}.cover{width:160px;height:160px;object-fit:cover;border-radius:18px;border:1px solid #e5e7eb;background:#fff}.title{font-weight:800;font-size:21px}.muted{color:#4b5563}table{width:100%;border-collapse:collapse;margin-top:16px}td{border:1px solid #d1d5db;padding:9px 10px;text-align:left;vertical-align:top;font-size:14px}.label{background:#f9fafb;font-weight:800;width:28%}.pre{white-space:pre-line}@media(max-width:720px){.sheet{padding:22px}.hero{grid-template-columns:1fr}.cover{width:140px;height:140px}.actions{justify-content:stretch}.btn{text-align:center;width:100%;}}
  </style>
</head>
<body>
  <main class="page">
    <div class="actions"><a class="btn" href="{{ pdf_url }}">Descargar PDF</a></div>
    <article class="sheet">
      <div class="brand-row">{% if brand.logo_url %}<img class="brand" src="{{ brand.logo_url }}" alt="{{ brand.company_name or 'PIES' }}">{% endif %}</div>
      <h1>Label Copy</h1>
      <section class="hero">
        <img class="cover" src="{{ cover_url or brand.logo_url or url_for('static', filename='img/logo.png') }}" alt="{{ album.title }}">
        <div><div class="title">{{ album.title }}</div><div class="muted">{{ artist_name }}</div></div>
      </section>
      <table><tbody>{% for row in info_rows %}<tr><td class="label">{{ row.label }}</td><td class="pre">{{ row.value }}</td></tr>{% endfor %}</tbody></table>
    </article>
  </main>
</body>
</html>
